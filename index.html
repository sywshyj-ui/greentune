<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenTune</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- 标题栏 -->
  <header class="titlebar">
    <div class="tb-left">
      <span class="logo-dot"></span>
      <span class="logo-text">浩哥的Music</span>
    </div>
    <div class="tb-drag"></div>
    <div class="tb-right">
      <button class="tb-btn" id="win-min" title="最小化">&#x2014;</button>
      <button class="tb-btn" id="win-max" title="最大化">&#x25A1;</button>
      <button class="tb-btn close" id="win-close" title="关闭">&#x2715;</button>
    </div>
  </header>

  <div class="app">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <nav class="nav-main">
        <div class="nav-item active" data-view="home">
          <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M12 3l9 8h-3v9h-5v-6h-2v6H6v-9H3z"/></svg>
          <span>主页</span>
        </div>
        <div class="nav-item" data-view="search">
          <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M10 4a6 6 0 014.47 10l5.27 5.26-1.42 1.42L13.05 15.4A6 6 0 1110 4zm0 2a4 4 0 100 8 4 4 0 000-8z"/></svg>
          <span>搜索</span>
        </div>
        <div class="nav-item" data-view="library">
          <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M4 4h2v16H4zM8 4h2v16H8zm5 0l5 1-3 14-5-1z"/></svg>
          <span>音乐库</span>
        </div>
        <div class="nav-item" data-view="online">
          <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
          <span>在线搜索</span>
        </div>
        <div class="nav-item" data-view="recommend">
          <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
          <span>推荐</span>
        </div>
      </nav>

      <div class="sidebar-card">
        <div class="card-head">
          <span class="card-title">我的歌单</span>
          <button class="card-add" id="create-pl" title="新建歌单">＋</button>
        </div>
        <div class="pl-list" id="pl-list">
          <div class="pl-item" data-view="favorites">
            <span class="pl-ico heart">♥</span>
            <div class="pl-meta"><span class="pl-name">我喜欢</span><span class="pl-sub">歌单</span></div>
          </div>
          <div class="pl-item" data-view="recent">
            <span class="pl-ico">🕑</span>
            <div class="pl-meta"><span class="pl-name">最近播放</span><span class="pl-sub">自动</span></div>
          </div>
        </div>
      </div>

      <button class="add-btn" id="add-music">＋ 添加音乐</button>
    </aside>

    <!-- 主内容 -->
    <main class="main">
      <div class="topbar">
        <div class="search-box" id="search-box">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M10 4a6 6 0 014.47 10l5.27 5.26-1.42 1.42L13.05 15.4A6 6 0 1110 4zm0 2a4 4 0 100 8 4 4 0 000-8z"/></svg>
          <input type="text" id="search-input" placeholder="搜索歌曲、艺术家、专辑">
        </div>
        <div class="topbar-actions">
          <button class="ghost-btn" id="theme-btn" title="切换主题">🌙</button>
        </div>
      </div>

      <div class="view-scroll" id="view-scroll">
        <!-- 视图标题 -->
        <div class="view-head">
          <h1 id="view-title">主页</h1>
          <span class="view-count" id="view-count"></span>
        </div>

        <!-- 歌曲列表 -->
        <div class="song-table" id="song-table">
          <div class="st-head">
            <div class="st-col idx">#</div>
            <div class="st-col title" data-sort="title">标题<span class="sort-arrow"></span></div>
            <div class="st-col album" data-sort="album">专辑<span class="sort-arrow"></span></div>
            <div class="st-col genre">流派</div>
            <div class="st-col dur" data-sort="duration">时长<span class="sort-arrow"></span></div>
          </div>
          <div class="st-body" id="song-body"></div>
        </div>

        <!-- 空状态 -->
        <div class="empty" id="empty-state" hidden>
          <div class="empty-ico">🎵</div>
          <h3 id="empty-title">还没有音乐</h3>
          <p id="empty-sub">点击左下角「添加音乐」导入本地文件或文件夹</p>
        </div>
      </div>
    </main>

    <!-- 歌词面板 -->
    <aside class="lyrics-panel" id="lyrics-panel">
      <div class="lp-head">
        <span>歌词</span>
        <button class="ghost-btn" id="close-lyrics" title="收起">✕</button>
      </div>
      <div class="lp-lyrics" id="lp-lyrics">
        <p class="lp-placeholder">播放歌曲后将显示歌词</p>
      </div>
    </aside>
  </div>

  <!-- 播放条 -->
  <footer class="player">
    <div class="player-left">
      <div class="now-cover rotating" id="now-cover">
        <img src="assets/logo.jpg" alt="Logo">
      </div>
      <canvas id="visualizer" width="120" height="56"></canvas>
      <div class="now-meta">
        <div class="now-title" id="now-title">未播放</div>
        <div class="now-artist" id="now-artist">选择一首歌曲开始</div>
      </div>
      <button class="icon-btn like-btn" id="like-btn" title="喜欢">♡</button>
    </div>

    <div class="player-center">
      <div class="ctrl-row">
        <button class="icon-btn" id="mode-btn" title="播放模式">
          <svg id="mode-icon" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
        </button>
        <button class="icon-btn" id="prev-btn" title="上一首">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M7 6h2v12H7zm3 6l9 6V6z"/></svg>
        </button>
        <button class="play-btn" id="play-btn" title="播放/暂停">
          <svg id="play-icon" viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="icon-btn" id="next-btn" title="下一首">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M15 6h2v12h-2zM5 18l9-6-9-6z"/></svg>
        </button>
        <button class="icon-btn" id="locate-btn" title="定位当前播放">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0013 3.06V1h-2v2.06A8.994 8.994 0 003.06 11H1v2h2.06A8.994 8.994 0 0011 20.94V23h2v-2.06A8.994 8.994 0 0020.94 13H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
        </button>
      </div>
      <div class="progress-row">
        <span class="time" id="cur-time">0:00</span>
        <div class="progress" id="progress">
          <div class="progress-fill" id="progress-fill"></div>
          <div class="progress-knob" id="progress-knob"></div>
        </div>
        <span class="time" id="dur-time">0:00</span>
      </div>
    </div>

    <div class="player-right">
      <button class="icon-btn" id="lyrics-toggle" title="歌词">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M4 5h16v2H4zm0 4h16v2H4zm0 4h10v2H4zm0 4h10v2H4z"/></svg>
      </button>
      <button class="icon-btn" id="eq-btn" title="均衡器">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
      </button>
      <button class="icon-btn" id="vol-btn" title="静音">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M5 9v6h4l5 5V4L9 9H5zm11.5 3a4.5 4.5 0 00-2.5-4v8a4.5 4.5 0 002.5-4z"/></svg>
      </button>
      <div class="vol" id="vol-bar">
        <div class="vol-fill" id="vol-fill"></div>
        <div class="vol-knob" id="vol-knob"></div>
      </div>
    </div>
  </footer>

  <!-- 新建歌单弹窗 -->
  <div class="modal" id="pl-modal" hidden>
    <div class="modal-box">
      <h3>新建歌单</h3>
      <input type="text" id="pl-name-input" placeholder="歌单名称" maxlength="40">
      <div class="modal-actions">
        <button class="ghost-btn" id="pl-cancel">取消</button>
        <button class="primary-btn" id="pl-confirm">创建</button>
      </div>
    </div>
  </div>

  <!-- 均衡器弹窗 -->
  <div class="modal" id="eq-modal" hidden>
    <div class="modal-box eq-box">
      <h3>均衡器</h3>
      <div class="eq-presets">
        <button class="eq-preset-btn" data-preset="flat">平直</button>
        <button class="eq-preset-btn" data-preset="pop">流行</button>
        <button class="eq-preset-btn" data-preset="rock">摇滚</button>
        <button class="eq-preset-btn" data-preset="jazz">爵士</button>
        <button class="eq-preset-btn" data-preset="classical">古典</button>
        <button class="eq-preset-btn" data-preset="vocal">人声</button>
      </div>
      <div class="eq-sliders" id="eq-sliders">
        <!-- 10 个频段滑块,JS 动态生成 -->
      </div>
      <div class="modal-actions">
        <button class="ghost-btn" id="eq-close">关闭</button>
      </div>
    </div>
  </div>

  <audio id="audio"></audio>
  <script src="js/app.js"></script>
</body>
</html>
